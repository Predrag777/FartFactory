<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Gas Slots UI</title>
  <link rel="stylesheet" href="style/gameplayStyle.css" />
   <link rel="stylesheet" href="style/popupsStyle.css" />
</head>
<body>
  <div class="app">
    <header>


        <div class="header-right">
            <div class="pill" id="gameTimer">00:00</div>
            <div class="pill fart-pill" id="fartCounter">💨 0</div>
        </div>
    </header>

    <main>
      <!-- Constipation alert banners -->
      <div class="constipation-alert constipation-alert-top" id="constAlertTop">
        <span class="constipation-alert-text">CONSTIPATION</span>
        <div class="constipation-alert-arrow">▼</div>
      </div>

      <section class="grid" id="topGrid">
        <button class="slot" data-slot="1" aria-label="Slot 1">
          <div class="gas"><div class="gas-wave"></div></div>
          <div class="slot-inner">
            <img class="character" src="UI/characters/fart1.png" alt="Fart 1" />
            <div class="slot-id">Baby</div>
          </div>
        </button>

        <button class="slot" data-slot="2" aria-label="Slot 2">
          <div class="gas"><div class="gas-wave"></div></div>
          <div class="slot-inner">
            <img class="character" src="UI/characters/fart2.png" alt="Fart 2" />
            <div class="slot-id">Jazz</div>
          </div>
        </button>

        <button class="slot" data-slot="3" aria-label="Slot 3">
          <div class="gas"><div class="gas-wave"></div></div>
          <div class="slot-inner">
            <img class="character" src="UI/characters/fart3.png" alt="Fart 3" />
            <div class="slot-id">Polka</div>
          </div>
        </button>

        <button class="slot" data-slot="4" aria-label="Slot 4">
          <div class="gas"><div class="gas-wave"></div></div>
          <div class="slot-inner">
            <img class="character" src="UI/characters/fart4.png" alt="Fart 4" />
            <div class="slot-id">Grandpa</div>
          </div>
        </button>
      </section>

      <div class="tube-row tube-row-top" aria-hidden="true">
        <div class="tube" data-slot="1"><div class="tube-fill"></div></div>
        <div class="tube" data-slot="2"><div class="tube-fill"></div></div>
        <div class="tube" data-slot="3"><div class="tube-fill"></div></div>
        <div class="tube" data-slot="4"><div class="tube-fill"></div></div>
      </div>

      <section class="middle-container" id="middleDeathsContainer" aria-label="Deaths progress">
        <div class="middle-gas" id="middleGasFill"><div class="middle-gas-wave"></div></div>
        <div class="middle-content">
          <span class="middle-value" id="middleDeathsValue">0 / 5</span>
          <span class="middle-skull" aria-hidden="true">💀</span>
        </div>
      </section>

      <div class="tube-row tube-row-bottom" aria-hidden="true">
        <div class="tube" data-slot="5"><div class="tube-fill"></div></div>
        <div class="tube" data-slot="6"><div class="tube-fill"></div></div>
        <div class="tube" data-slot="7"><div class="tube-fill"></div></div>
        <div class="tube" data-slot="8"><div class="tube-fill"></div></div>
      </div>

      <section class="grid" id="bottomGrid">
        <button class="slot" data-slot="5" aria-label="Slot 5">
          <div class="gas"><div class="gas-wave"></div></div>
          <div class="slot-inner">
            <img class="character" src="UI/characters/fart5.png" alt="Fart 5" />
            <div class="slot-id">Teddy Bear</div>
          </div>
        </button>

        <button class="slot" data-slot="6" aria-label="Slot 6">
          <div class="gas"><div class="gas-wave"></div></div>
          <div class="slot-inner">
            <img class="character" src="UI/characters/fart6.png" alt="Fart 6" />
            <div class="slot-id">Walkie Talkie</div>
          </div>
        </button>

        <button class="slot" data-slot="7" aria-label="Slot 7">
          <div class="gas"><div class="gas-wave"></div></div>
          <div class="slot-inner">
            <img class="character" src="UI/characters/fart7.png" alt="Fart 7" />
            <div class="slot-id">Wedding</div>
          </div>
        </button>

        <button class="slot" data-slot="8" aria-label="Slot 8">
          <div class="gas"><div class="gas-wave"></div></div>
          <div class="slot-inner">
            <img class="character" src="UI/characters/fart8.png" alt="Fart 8" />
            <div class="slot-id">Gym</div>
          </div>
        </button>
      </section>

      <!-- Constipation alert bottom -->
      <div class="constipation-alert constipation-alert-bottom" id="constAlertBottom">
        <div class="constipation-alert-arrow">▲</div>
        <span class="constipation-alert-text">CONSTIPATION</span>
      </div>
    </main>

    <footer>
      <div id="mobileStatsHost"></div>
    </footer>
  </div>


  
    <!-- EXPLOSION OVERLAY (for game over and 3 dead) -->
    <div class="explosion-overlay" id="explosionOverlay"></div>
    <div class="explosion-flash" id="explosionFlash"></div>

    <!-- GAME OVER POPUP -->
    <div class="gameover-backdrop" id="gameOverBackdrop">
        <div class="gameover-modal" role="dialog" aria-modal="true">

        <div class="gameover-center">
            <img class="gameover-title-img" src="UI/images/game-over-title.png" alt="Game Over" />
            <div class="highscore-badge" id="highscoreBadge" style="display:none;">🏆 NEW HIGH SCORE!</div>
        </div>

        <div class="gameover-stats">
            <div class="stat">
                <div class="label">TIME</div>
                <div class="value" id="finalTime">00:00</div>
            </div>
            <div class="stat">
                <div class="label">FARTS</div>
                <div class="value" id="finalFarts">0</div>
            </div>
        </div>

        <div class="gameover-actions">
            <button class="btn primary" id="restartBtn">PLAY AGAIN</button>
            <button class="btn secondary" id="exitBtn">EXIT</button>
        </div>

        </div>
    </div>

  <script src="JAVASCRIPT/game.js"></script>
</body>
</html>
